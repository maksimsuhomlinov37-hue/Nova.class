<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaClass Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#3B82F6;--primary-lighter:#60A5FA;--primary-bg:#DBEAFE;--primary-surface:#EFF6FF;--page-bg:#F0F4FA;--card-bg:#FFFFFF;--text-primary:#111827;--text-secondary:#6B7280;--text-muted:#9CA3AF;--border:rgba(37,99,235,.07);--border-hover:rgba(37,99,235,.15);--shadow-sm:0 1px 8px rgba(37,99,235,.04);--shadow:0 8px 32px rgba(37,99,235,.07);--shadow-lg:0 20px 60px rgba(37,99,235,.1);--radius:18px;--sidebar-closed:76px;--sidebar-open:268px;--topbar-h:68px;--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--danger:#EF4444;--danger-bg:#FEF2F2;--success:#059669;--success-bg:#D1FAE5;--warning:#F59E0B;--warning-bg:#FEF3C7;--glass:rgba(255,255,255,.7);--glass-border:rgba(255,255,255,.5);--preview-accent:#2563EB;--preview-bg:#F0F4FA;--preview-radius:18px;--preview-shadow:0 8px 32px rgba(37,99,235,.07);--preview-font:'Inter',sans-serif;--preview-text:14px;--preview-card-bg:#FFFFFF}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--page-bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{border:none;background:none;cursor:pointer;font-family:var(--font);color:inherit}
input,select,textarea{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(37,99,235,.1);border-radius:3px}

.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-closed);height:100vh;background:var(--card-bg);border-right:1px solid var(--border);z-index:100;transition:width .45s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{width:var(--sidebar-open)}
.sidebar-head{height:var(--topbar-h);display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;cursor:pointer;transition:background .3s}
.sidebar-head:hover{background:var(--primary-surface)}
.sidebar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.25);transition:transform .35s ease}
.sidebar-head:hover .sidebar-logo{transform:scale(1.08) rotate(-2deg)}
.sidebar-brand{font-weight:700;font-size:16px;white-space:nowrap;opacity:0;transition:opacity .35s ease .12s}
.sidebar.open .sidebar-brand{opacity:1}
.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;overflow-x:hidden}
.nav-item{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:14px;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;white-space:nowrap;overflow:hidden;position:relative}
.nav-item i{font-size:17px;width:22px;text-align:center;flex-shrink:0;color:var(--text-muted);transition:all .3s ease}
.nav-item span{font-size:13px;font-weight:500;opacity:0;transition:opacity .25s ease .1s;color:var(--text-secondary)}
.sidebar.open .nav-item span{opacity:1}
.nav-item:hover{background:var(--primary-surface)}
.nav-item:hover i{color:var(--primary);transform:scale(1.08)}
.nav-item:hover span{color:var(--primary)}
.nav-item.active{background:var(--primary);box-shadow:0 4px 18px rgba(37,99,235,.3)}
.nav-item.active i{color:#fff}
.nav-item.active span{color:#fff;opacity:1}

.main-wrap{margin-left:var(--sidebar-closed);min-height:100vh;transition:margin-left .45s cubic-bezier(.4,0,.2,1)}
.main-wrap.shifted{margin-left:var(--sidebar-open)}

.topbar{height:var(--topbar-h);background:rgba(255,255,255,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-right{display:flex;align-items:center;gap:8px;position:relative}
.burger{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:all .25s ease;color:var(--text-secondary);font-size:16px}
.burger:hover{background:var(--primary-surface);color:var(--primary)}
.page-title{font-size:16px;font-weight:700}
.lang-sw{display:flex;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.lang-sw button{padding:5px 11px;font-size:11px;font-weight:700;transition:all .25s;color:var(--text-muted);letter-spacing:.3px}
.lang-sw button:hover{background:var(--primary-surface);color:var(--primary)}
.lang-sw button.active{background:var(--primary);color:#fff}
.btn-save{padding:8px 20px;border-radius:12px;background:var(--primary);color:#fff;font-size:13px;font-weight:600;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(37,99,235,.25)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35)}
.btn-save:active{transform:scale(.97)}
.btn-profile{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border-radius:12px;transition:all .3s;border:1px solid var(--border)}
.btn-profile:hover{background:var(--primary-surface);border-color:var(--border-hover)}
.avatar-sm{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
.prof-dd{position:absolute;top:calc(100% + 6px);right:0;width:200px;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;visibility:hidden;transform:translateY(-6px) scale(.97);transition:all .3s cubic-bezier(.4,0,.2,1);z-index:60;overflow:hidden}
.prof-dd.open{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.prof-dd-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all .2s;cursor:pointer}
.prof-dd-item:hover{background:var(--primary-surface);color:var(--primary)}
.prof-dd-item i{width:16px;text-align:center;font-size:13px}
.prof-dd-item.danger{color:var(--danger)}
.prof-dd-item.danger:hover{background:var(--danger-bg)}

.content{padding:28px;min-height:calc(100vh - var(--topbar-h))}
.section{display:none;opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s cubic-bezier(.4,0,.2,1)}
.section.visible{display:block}
.section.active{opacity:1;transform:translateY(0)}

/* Статистика */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);transition:all .35s cubic-bezier(.4,0,.2,1);animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--border-hover)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.stat-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:13px;color:var(--text-secondary);font-weight:500}

/* Карточки элементов */
.item-list{display:flex;flex-direction:column;gap:12px}
.item-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow-sm);transition:all .35s cubic-bezier(.4,0,.2,1);animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;display:flex;align-items:center;gap:16px}
.item-card:hover{box-shadow:var(--shadow);border-color:var(--border-hover)}
.item-num{width:40px;height:40px;border-radius:12px;background:var(--primary-surface);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--primary);flex-shrink:0;transition:all .3s}
.item-card:hover .item-num{background:var(--primary);color:#fff;transform:scale(1.06)}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:700;margin-bottom:2px}
.item-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap}
.item-meta span{display:flex;align-items:center;gap:4px}
.item-actions{display:flex;gap:6px;flex-shrink:0}
.act-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-muted);transition:all .25s}
.act-btn:hover{background:var(--primary-surface);color:var(--primary);border-color:var(--primary-bg);transform:scale(1.08)}
.act-btn.danger:hover{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bg)}
.act-btn.move:hover{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-bg)}

/* Кнопки */
.btn-add{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:14px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(37,99,235,.25);margin-bottom:20px}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.35)}
.btn-add:active{transform:scale(.97)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:14px;background:var(--card-bg);color:var(--text-secondary);font-size:14px;font-weight:600;border:1px solid var(--border);transition:all .3s}
.btn-secondary:hover{background:var(--primary-surface);color:var(--primary);border-color:var(--primary-bg)}

/* Секция заголовок */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.sec-title{font-size:22px;font-weight:800;letter-spacing:-.2px}
.search-box{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card-bg);transition:all .25s;width:260px}
.search-box:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-box i{color:var(--text-muted);font-size:14px}
.search-box input{border:none;background:none;font-size:13px;font-weight:500;color:var(--text-primary);width:100%}

/* Модалки */
.modal-ov{position:fixed;inset:0;background:rgba(17,24,39,.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;opacity:0;visibility:hidden;transition:all .35s;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{opacity:1;visibility:visible}
.modal-box{background:var(--card-bg);border-radius:var(--radius);width:100%;max-width:520px;box-shadow:var(--shadow-lg);transform:translateY(16px) scale(.97);transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden;max-height:85vh;overflow-y:auto}
.modal-ov.open .modal-box{transform:translateY(0) scale(1)}
.modal-head{padding:22px 26px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:800}
.modal-x{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .25s;font-size:15px}
.modal-x:hover{background:#F3F4F6;color:var(--text-primary);transform:rotate(90deg)}
.modal-body{padding:20px 26px 26px}
.form-group{margin-bottom:16px}
.form-group:last-child{margin-bottom:0}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text-primary);font-size:14px;font-weight:500;transition:all .25s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-textarea{min-height:80px;resize:vertical;line-height:1.6}
.form-select{cursor:pointer;appearance:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:0 26px 22px}
.btn-modal{padding:10px 22px;border-radius:12px;font-size:13px;font-weight:600;transition:all .25s}
.btn-modal.primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.btn-modal.primary:hover{box-shadow:0 6px 18px rgba(37,99,235,.35);transform:translateY(-1px)}
.btn-modal.ghost{background:#F3F4F6;color:var(--text-secondary)}
.btn-modal.ghost:hover{background:var(--primary-surface);color:var(--primary)}

/* Бейджи */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:var(--primary-bg);color:var(--primary)}
.badge-green{background:#D1FAE5;color:#059669}
.badge-yellow{background:#FEF3C7;color:#D97706}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.badge-purple{background:#EDE9FE;color:#7C3AED}

/* Настройки дизайн — превью */
.design-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.design-preview{background:var(--page-bg);border-radius:var(--radius);border:1px solid var(--border);padding:28px;min-height:320px;display:flex;flex-direction:column;gap:16px;transition:all .4s}
.preview-header{padding:14px 18px;background:var(--preview-card-bg);border-radius:var(--preview-radius);box-shadow:var(--preview-shadow);display:flex;align-items:center;gap:10px;transition:all .4s}
.preview-logo{width:32px;height:32px;border-radius:10px;background:var(--preview-accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;transition:all .4s}
.preview-title{font-family:var(--preview-font);font-size:15px;font-weight:700;transition:all .3s}
.preview-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.preview-card{background:var(--preview-card-bg);border-radius:var(--preview-radius);box-shadow:var(--preview-shadow);padding:16px;transition:all .4s}
.preview-card-line{height:10px;border-radius:5px;background:var(--primary-bg);opacity:.6;margin-bottom:8px;transition:all .4s}
.preview-card-line:last-child{margin-bottom:0;width:70%}
.preview-btn{padding:10px 20px;border-radius:var(--preview-radius);background:var(--preview-accent);color:#fff;font-family:var(--preview-font);font-size:var(--preview-text);font-weight:600;text-align:center;transition:all .4s}
.design-controls{display:flex;flex-direction:column;gap:14px}

/* Toggle */
.toggle-sw{width:46px;height:26px;border-radius:13px;background:#D1D5DB;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle-sw.on{background:var(--primary)}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.toggle-sw.on::after{transform:translateX(20px)}

/* Тост */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:13px 20px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;animation:toastIn .35s cubic-bezier(.4,0,.2,1) both;min-width:240px}
.toast.out{animation:toastOut .3s ease both}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px) scale(.97)}}
.toast-icon{font-size:16px}
.toast-success .toast-icon{color:var(--success)}
.toast-error .toast-icon{color:var(--danger)}
.toast-info .toast-icon{color:var(--primary)}

/* Пустое состояние */
.empty-box{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-box i{font-size:40px;margin-bottom:14px;opacity:.4;display:block}
.empty-box p{font-size:14px;font-weight:500}

.sidebar-ov{position:fixed;inset:0;background:rgba(17,24,39,.25);backdrop-filter:blur(3px);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
.sidebar-ov.active{opacity:1;pointer-events:all}

@media(max-width:1024px){.design-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(max-width:768px){.sidebar{width:var(--sidebar-open);transform:translateX(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}.sidebar.open{transform:translateX(0)}.sidebar .sidebar-brand,.sidebar .nav-item span{opacity:1}.main-wrap{margin-left:0!important}.content{padding:20px 16px}.topbar{padding:0 16px}.search-box{width:180px}.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.sec-header{flex-direction:column;align-items:flex-start}.item-card{flex-wrap:wrap}.item-actions{width:100%;justify-content:flex-end;margin-top:8px}}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}.lang-sw{display:none}.search-box{width:140px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="sidebar-ov" id="sidebarOv"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-head" id="sidebarHead">
        <div class="sidebar-logo">N</div>
        <div class="sidebar-brand">NovaClass</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<div class="main-wrap" id="mainWrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="burger" id="burger" aria-label="Меню"><i class="fa-solid fa-bars"></i></button>
            <span class="page-title" id="pageTitle">Главная</span>
        </div>
        <div class="topbar-right">
            <div class="lang-sw" id="langSw">
                <button class="active" data-l="ru">RU</button>
                <button data-l="en">EN</button>
            </div>
            <button class="btn-save" id="btnSave" title="Сохранить"><i class="fa-solid fa-cloud-arrow-up"></i><span class="save-text">Сохранить</span></button>
            <button class="btn-profile" id="btnProf"><div class="avatar-sm">A</div></button>
            <div class="prof-dd" id="profDd">
                <div class="prof-dd-item"><i class="fa-solid fa-user"></i><span>Администратор</span></div>
                <div class="prof-dd-item danger"><i class="fa-solid fa-right-from-bracket"></i><span>Выйти</span></div>
            </div>
        </div>
    </header>
    <main class="content" id="mainContent"></main>
</div>

<div class="modal-ov" id="modalOv"><div class="modal-box" id="modalBox"></div></div>
<div class="toast-wrap" id="toastWrap"></div>

function scheduleCard(l,i){
    return '<div class="item-card" data-id="'+l.id+'" style="animation-delay:'+(i*0.04)+'s"><div class="item-num">'+l.num+'</div><div class="item-info"><div class="item-name">'+l.name+'</div><div class="item-meta"><span><i class="fa-regular fa-clock"></i> '+l.time+'</span><span><i class="fa-solid fa-user"></i> '+l.teacher+'</span><span><i class="fa-solid fa-location-dot"></i> '+l.room+'</span></div></div><div class="item-actions"><button class="act-btn move" onclick="moveLesson('+l.id+',-1)" title="Вверх"><i class="fa-solid fa-chevron-up"></i></button><button class="act-btn move" onclick="moveLesson('+l.id+',1)" title="Вниз"><i class="fa-solid fa-chevron-down"></i></button><button class="act-btn" onclick="openScheduleModal('+l.id+')" title="Изменить"><i class="fa-solid fa-pen"></i></button><button class="act-btn danger" onclick="deleteItem(\'schedule\','+l.id+')" title="Удалить"><i class="fa-solid fa-trash"></i></button></div></div>';

var scheduleFilterDay=0;
function filterScheduleDay(day,btn){
    scheduleFilterDay=day;
    document.querySelectorAll('.day-filter').forEach(function(b){b.classList.remove('active');b.style.background='';b.style.color='';b.style.borderColor='';});
    btn.classList.add('active');btn.style.background='var(--primary)';btn.style.color='#fff';btn.style.borderColor='var(--primary)';
    var list=document.getElementById('scheduleList');
    var items=DATA.schedule.filter(function(l){return l.day===day;}).sort(function(a,b){return a.num-b.num;});
    list.innerHTML=items.length?items.map(function(l,i){return scheduleCard(l,i);}).join(''):'<div class="empty-box"><i class="fa-solid fa-calendar-xmark"></i><p>'+(curLang==='ru'?'Нет уроков':'No lessons')+'</p></div>';
}
function moveLesson(id,dir){
    var items=DATA.schedule.filter(function(l){return l.day===scheduleFilterDay;}).sort(function(a,b){return a.num-b.num;});
    var idx=items.findIndex(function(l){return l.id===id;});
    var target=idx+dir;
    if(target<0||target>=items.length)return;
    var tmpNum=items[idx].num;items[idx].num=items[target].num;items[target].num=tmpNum;
    filterScheduleDay(scheduleFilterDay,document.querySelector('.day-filter.active'));
    toast('info',curLang==='ru'?'Урок перемещён':'Lesson moved');
}

    openModal(modalHead(id?(curLang==='ru'?'Изменить урок':'Edit lesson'):(curLang==='ru'?'Добавить урок':'Add lesson'))+
    '<div class="modal-body">'+
        fg(curLang==='ru'?'День недели':'Day','<select class="form-select" id="mDay">'+DAYS.map(function(d,i){return'<option value="'+i+'"'+(l.day===i?' selected':'')+'>'+d[curLang]+'</option>';}).join('')+'</select>')+
        fg(curLang==='ru'?'Номер урока':'Lesson #','<input class="form-input" type="number" id="mNum" value="'+l.num+'" min="1" max="10">')+
        fg(curLang==='ru'?'Время':'Time','<input class="form-input" id="mTime" value="'+l.time+'" placeholder="08:30 – 09:15">')+
        fg(curLang==='ru'?'Предмет':'Subject','<input class="form-input" id="mName" value="'+l.name+'">')+
        fg(curLang==='ru'?'Учитель':'Teacher','<input class="form-input" id="mTeacher" value="'+l.teacher+'">')+
        fg(curLang==='ru'?'Кабинет':'Room','<input class="form-input" id="mRoom" value="'+l.room+'">')+
    '</div>'+modalFoot('saveSchedule('+id+')'));
}

function saveSchedule(id){
    var obj={day:+document.getElementById('mDay').value,num:+document.getElementById('mNum').value,time:document.getElementById('mTime').value,name:document.getElementById('mName').value,teacher:document.getElementById('mTeacher').value,room:document.getElementById('mRoom').value};
    if(!obj.name||!obj.time){toast('error',curLang==='ru'?'Заполните все поля':'Fill all fields');return;}
    if(id){var l=DATA.schedule.find(function(x){return x.id===id;});Object.assign(l,obj);}
    else{obj.id=++nextId;DATA.schedule.push(obj);}
    closeModal();renderSection('schedule');toast('success',curLang==='ru'?'Сохранено':'Saved');
}

// Тост
function toast(type,msg){
    var c=document.getElementById('toastWrap'),t=document.createElement('div');
    t.className='toast toast-'+type;
    var icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
    t.innerHTML='<i class="fa-solid '+(icons[type]||icons.info)+' toast-icon"></i><span>'+msg+'</span>';
    c.appendChild(t);setTimeout(function(){t.classList.add('out');setTimeout(function(){t.remove();},300);},2500);
}
